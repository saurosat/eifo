worker_processes 4;
error_log logs/error.log;
error_log logs/error.log info;
error_log logs/error.log debug;
events {
    worker_connections 256;
}
http {
    keepalive_timeout 5s;
    keepalive_requests 1000;

    lua_shared_dict lock 1m;
    lua_shared_dict cluster 12k;
    include /usr/local/openresty/nginx/conf/mime.types;
    root /fo/eifo;
    lua_package_path "$prefix/lua/?.lua;;"; 
    access_log logs/access.log;
    init_by_lua_block {
        eifo = {}
        eifo.db = {}
        eifo.db.poolsize = 64
        eifo.db.timeout = 10000
        eifo.db.host = "127.0.0.1"
        eifo.db.port = "6379"
        eifo.storeId = "store.p56586b3b100153"
        eifo.secretKey = "ABCD1234"
        eifo.lang = "en"
        l10n = require "l10n"
    }
    ## ngx.shared.cluster:set("IPs", "192.168.1.2,192.168.1.4")
    init_worker_by_lua_file 'lua/init.lua';

    map $cookie_lang $clang {
        default "en";
        ~*vi "vi";
        ~*cn "cn";
    }
    map $arg_lang $lang {
        default $clang;
        ~*en "en";
        ~*vi "vi";
        ~*cn "cn";
    }

    server {
        listen 443 ssl so_keepalive=on;
        listen [::]:443 ssl so_keepalive=on;
        http2 on;
        http2_max_concurrent_streams 1024;

        server_name gleecy.com;
        # ssl_certificate /etc/ssl/certs/gleecy.crt;
        # ssl_certificate_key /etc/ssl/private/gleecy.key;
        ssl_certificate /etc/ssl/certs/gleecy.com.pem;
        ssl_certificate_key /etc/ssl/private/gleecy.com.key;
        # ssl_certificate gleecy.com.crt;
        # ssl_certificate_key gleecy.com.key;
        # include /etc/openresty/self-signed.conf;
        # include /etc/openresty/ssl-params.conf;
        # ssl_certificate /etc/ssl/certs/openresty-selfsigned.crt;
        # ssl_certificate_key /etc/ssl/private/openresty-selfsigned.key;
        # ssl_client_certificate /etc/ssl/certs/ca.pem; # Optional, if needed
        # ssl_verify_client optional; # Optional, for client certificates

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers 'EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH';
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        # ssl_stapling on;
        # ssl_stapling_verify on;
        ssl_trusted_certificate /etc/ssl/certs/ca.pem;
        resolver 127.0.0.1 valid=300s; # Adjust resolver as needed
        resolver_timeout 5s;
        index home/index;
        # Web endpoint to receive notifications from Gleecy BO

        # set_by_lua_block $lang {
        #     return ngx.arg.lang or "en";
        # }
        rewrite_by_lua_file lua/reqInit.lua;
        location = / {
            sendfile on;
            allow all;
            default_type text/html; 
            try_files /home/index.html /api/index;
        }
        location /lang {
            sendfile on;
            allow all;
            default_type text/html; 
            try_files /home/$lang.html /home/index_$clang.html ;
        }
        location / {
            sendfile on;
            allow all;
            default_type text/html;
            try_files /home${uri}_$lang.html /home$uri/index_$lang.html /home$uri.html /home$uri/index.html /api$uri?$query_string;
        }
        # location ~* "^(?<path>/.+)/?\?.*lang=(?<lang>\w+).*$" {
        #     sendfile on;
        #     allow all;
        #     default_type text/html;
        #     try_files /home$path.html /home$path/index.html /api$uri;
        # }

        # location ~* "^(?!\/api)(?<path>\/?[^\?]*\/?)\??.*$" {
        #     sendfile on;
        #     allow all;
        #     default_type text/html;
        #     try_files /home$request_filename.html /home$request_filename/index.html /api$path;
        # }
        location = /token {
            default_type text/javascript;
            content_by_lua_file lua/sessionToken.lua;
        }
        location @images {
            content_by_lua_file lua/images.lua;
        }
        location ~* "^/(?<pseudoId>\w+)\.(?<sig>\w{8,16})\.(?<size>\d{2,4}x\d{2,4})\.(?<fileName>[^/\.]+)\.(?<ext>webp|svg|png|jpg|jpeg|gif|ico)$" {
            try_files /home/img/$pseudoId/$fileName.$sig.$size.$ext @images;
        }
        location ~* (\\|\||\$|\{|\[|\(|\)|\]|\})+ {
            return 404;
        }
        location ~* (.*?)(\/+)$ { # remove trailing slashes if any
            return 301 $scheme://$host$1;
        }
        location ~* \.(webp|svg|png|jpg|jpeg|gif|ico)$ {
            root home/img;
        }
        location ~* "^(?<path>.+)\.css$" {
            sendfile on;
            allow all;
            default_type text/css;
            try_files /home/css$uri /api/css$path;
        }
        location ~* "^(?<path>.+)\.js$" {
            sendfile on;
            allow all;
            default_type text/javascript;
            try_files /home/js$uri /api/js$path;
        }
        location /home/ {
            internal;
            sendfile on;
            tcp_nopush on;
            allow all;
            default_type text/html;
        }
        location /api/ {
            internal;
            default_type text/plain;
            content_by_lua_file lua/router.lua;
        }
        # Web endpoint to receive notifications from Gleecy BO
	    location /update {
            # allow 127.0.0.1;
            # allow gleecy.io IP;
            # deny  all;
	        default_type application/json;
            content_by_lua_file lua/update.lua;
        }
        location /setup {
            allow 127.0.0.1;
            deny  all;
	        default_type text/html;
            content_by_lua_file lua/setup/$uri.lua;
        }

        location ~* ^/test(?<uc>[^/\?]+)(/(?<params>.*$)|$) {
            allow 127.0.0.1;
            deny  all;
	        default_type text/html;
            content_by_lua_file lua/test/test$uc.lua;
        }
    }
    server {
        listen  80 default_server;
        listen  [::]:80 default_server;
        server_name gleecy.com;        # Web endpoint to receive notifications from Gleecy BO


        location / {
            return 307 https://$host$request_uri;
        }
    }
}
